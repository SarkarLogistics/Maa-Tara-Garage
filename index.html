<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAA TARA GARAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        /* Premium Garage Theme Background */
        body { 
            background: radial-gradient(circle at center, #1e293b, #0f172a); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }
        input, select { 
            background: #334155; 
            color: white; 
            border: 1px solid #475569; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            text-transform: uppercase; 
            outline: none;
        }
        input:focus { border-color: #eab308; box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); }
        .card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .print-box { 
                border: 3px solid #000; 
                padding: 30px; 
                margin: 10px; 
                page-break-after: always; 
                position: relative;
            }
            /* Business Pattern Design for Print */
            .print-box::before {
                content: "";
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 50%, #f0f0f0 50%, #f0f0f0 75%, transparent 75%, transparent);
                background-size: 100px 100px;
                opacity: 0.1;
                z-index: -1;
            }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid black !important; padding: 10px; text-align: left; }
            th { background: #f1f5f9 !important; }
            .total-row { background: #eee !important; font-weight: bold; font-size: 20px; }
        }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div id="loginPage" class="flex flex-col items-center justify-center h-[80vh] no-print">
        <div class="card w-full max-w-sm text-center border-t-4 border-yellow-500">
            <h1 class="text-3xl font-black text-yellow-500 mb-2 uppercase tracking-tighter">Maa Tara Garage</h1>
            <p class="text-gray-400 text-xs mb-8">SECURE BILLING SYSTEM</p>
            <input type="password" id="pass" placeholder="ENTER PASSWORD" class="mb-6 text-center text-xl font-bold tracking-widest">
            <button onclick="doLogin()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl transition-all shadow-lg">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="appPage" class="hidden max-w-6xl mx-auto no-print">
        <div class="flex flex-wrap justify-between items-center mb-8 bg-slate-800/80 p-6 rounded-2xl border-b-4 border-yellow-500 shadow-xl">
            <div>
                <h1 class="text-3xl font-black text-yellow-500 tracking-tight">MAA TARA GARAGE</h1>
                <p class="text-sm font-bold text-gray-300">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                <p class="text-xs text-yellow-500 font-bold mt-1">CONTACT: +91 94255 07393, +91 73895 07393</p>
            </div>
            <button onclick="location.reload()" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-lg font-bold shadow-lg mt-4 lg:mt-0">LOGOUT</button>
        </div>

        <div class="card grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">VEHICLE NO</label><input type="text" id="vNo" placeholder="CG 04 XXXX"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">OWNER NAME</label><input type="text" id="oName" placeholder="ENTER NAME"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">OWNER PHONE</label><input type="text" id="oPhone" placeholder="MOBILE NO"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">DATE</label><input type="date" id="bDate"></div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-yellow-500 ml-1">WHEELS</label>
                <select id="vWheel">
                    <option value="6 CHAKKA">6 CHAKKA</option>
                    <option value="10 CHAKKA">10 CHAKKA</option>
                    <option value="12 CHAKKA">12 CHAKKA</option>
                    <option value="14 CHAKKA">14 CHAKKA</option>
                    <option value="16 CHAKKA">16 CHAKKA</option>
                    <option value="18 CHAKKA">18 CHAKKA</option>
                    <option value="22 CHAKKA">22 CHAKKA</option>
                </select>
            </div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">MODEL</label><input type="text" id="vModel" placeholder="TATA / LEYLAND"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">DRIVER NAME</label><input type="text" id="dName" placeholder="DRIVER"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 ml-1">MECHANIC NAME</label><input type="text" id="mName" placeholder="MECHANIC"></div>
        </div>

        <div class="card">
            <div class="overflow-x-auto">
                <table class="w-full mb-6">
                    <thead class="text-yellow-500 text-left border-b border-gray-600 uppercase text-sm">
                        <tr><th class="p-4">SN</th><th>WORK DESCRIPTION</th><th class="w-24 text-center">QTY</th><th class="w-32 text-right">RATE</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="border-b border-gray-700/50">
                            <td class="p-4 font-bold text-gray-500">1</td>
                            <td class="p-2"><input type="text" class="row-desc border-0 bg-transparent focus:bg-slate-700"></td>
                            <td class="p-2"><input type="number" class="row-qty text-center bg-transparent focus:bg-slate-700" value="1" oninput="doMath()"></td>
                            <td class="p-2"><input type="number" class="row-rate text-right bg-transparent focus:bg-slate-700" placeholder="0" oninput="doMath()"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="flex flex-wrap justify-between items-center gap-4">
                <button onclick="addNewRow()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-all shadow-lg">+ ADD NEW LINE</button>
                <div class="text-right">
                    <p class="text-gray-400 text-sm uppercase font-bold">Grand Total</p>
                    <h2 class="text-4xl font-black text-yellow-500">₹<span id="gTotal">0</span></h2>
                </div>
            </div>
            <button onclick="startPrint()" class="w-full mt-10 bg-green-600 hover:bg-green-500 text-white py-6 rounded-2xl font-black text-3xl uppercase shadow-2xl transition-all border-b-8 border-green-800 active:border-0">SAVE & PRINT BILL</button>
        </div>
    </div>

    <div id="printSection" class="hidden"></div>

    <script>
        // Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyAvR17FZtEaRPT1_xlHSGB6lc0tCTuwVSM", 
            authDomain: "maa-tara-garage.firebaseapp.com", 
            projectId: "maa-tara-garage", 
            storageBucket: "maa-tara-garage.appspot.com", 
            messagingSenderId: "689254184022", 
            appId: "1:689254184022:web:b3a4af5219dcff9b74f7f7" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // New Password as requested
        function doLogin() {
            if(document.getElementById('pass').value === "Rahul@6927") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('appPage').classList.remove('hidden');
            } else { alert("WRONG PASSWORD! PLEASE TRY AGAIN."); }
        }

        function addNewRow() {
            let table = document.getElementById('tableBody');
            let row = table.insertRow();
            row.className = "border-b border-gray-700/50";
            row.innerHTML = `<td class="p-4 font-bold text-gray-500">${table.rows.length}</td><td class="p-2"><input type="text" class="row-desc border-0 bg-transparent focus:bg-slate-700"></td><td class="p-2"><input type="number" class="row-qty text-center bg-transparent focus:bg-slate-700" value="1" oninput="doMath()"></td><td class="p-2"><input type="number" class="row-rate text-right bg-transparent focus:bg-slate-700" oninput="doMath()"></td>`;
        }

        function doMath() {
            let total = 0;
            document.querySelectorAll('#tableBody tr').forEach(r => {
                let q = r.querySelector('.row-qty').value || 0;
                let rt = r.querySelector('.row-rate').value || 0;
                total += (parseFloat(q) * parseFloat(rt));
            });
            document.getElementById('gTotal').innerText = total;
        }

        async function startPrint() {
            const bill = {
                vNo: document.getElementById('vNo').value.toUpperCase(),
                owner: document.getElementById('oName').value.toUpperCase(),
                phone: document.getElementById('oPhone').value,
                date: document.getElementById('bDate').value,
                wheels: document.getElementById('vWheel').value,
                model: document.getElementById('vModel').value.toUpperCase(),
                mechanic: document.getElementById('mName').value.toUpperCase(),
                driver: document.getElementById('dName').value.toUpperCase(),
                total: document.getElementById('gTotal').innerText
            };

            if(!bill.vNo || !bill.date) { alert("ERROR: VEHICLE NO AND DATE ARE REQUIRED!"); return; }

            try { await db.collection("garage_bills").add(bill); } catch(e) { console.log("Database Sync Error"); }

            let items = "";
            document.querySelectorAll('#tableBody tr').forEach((r, i) => {
                let desc = r.querySelector('.row-desc').value.toUpperCase();
                let q = r.querySelector('.row-qty').value;
                let rt = r.querySelector('.row-rate').value;
                if(desc) items += `<tr><td style="text-align:center">${i+1}</td><td>${desc}</td><td style="text-align:center">${q}</td><td style="text-align:right">${rt}</td><td style="text-align:right; font-weight:bold;">${q*rt}</td></tr>`;
            });

            const renderBill = (copyType) => `
                <div class="print-box">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:4px solid #000; padding-bottom:15px;">
                        <div>
                            <h1 style="margin:0; font-size:42px; font-weight:900; letter-spacing:-1px;">MAA TARA GARAGE</h1>
                            <p style="margin:0; font-weight:bold; font-size:16px;">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                            <p style="margin:0; font-size:14px;">MOB: +91 94255 07393, +91 73895 07393</p>
                        </div>
                        <div style="text-align:right;">
                            <h2 style="border:3px solid #000; padding:8px 20px; margin:0; font-size:24px;">INVOICE</h2>
                            <p style="margin-top:10px; font-weight:bold; font-size:18px;">DATE: ${bill.date}</p>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin:20px 0; border:2px solid #000; padding:15px; background:#f9f9f9;">
                        <span><b>VEHICLE NO:</b> <span style="font-size:18px;">${bill.vNo}</span></span> 
                        <span><b>OWNER NAME:</b> ${bill.owner}</span>
                        <span><b>OWNER PHONE:</b> ${bill.phone}</span> 
                        <span><b>MODEL/WHEELS:</b> ${bill.model} (${bill.wheels})</span>
                        <span><b>MECHANIC:</b> ${bill.mechanic}</span> 
                        <span><b>DRIVER:</b> ${bill.driver}</span>
                    </div>
                    <table>
                        <thead><tr><th style="width:50px">SN</th><th>DESCRIPTION OF WORK REPAIR</th><th style="width:70px">QTY</th><th style="width:100px">RATE</th><th style="width:120px">AMOUNT</th></tr></thead>
                        <tbody>${items}</tbody>
                        <tfoot><tr class="total-row"><td colspan="4" style="text-align:right; padding:15px;">GRAND TOTAL AMOUNT:</td><td style="text-align:right; font-size:24px;">₹${bill.total}</td></tr></tfoot>
                    </table>
                    <div style="margin-top:30px; font-size:12px; border:1px solid #ccc; padding:10px; line-height:1.4;">
                        <b>TERMS & CONDITIONS:</b><br>
                        1. GOODS ONCE SOLD ARE NOT RETURNABLE. <br>
                        2. WE ARE NOT RESPONSIBLE FOR ANY LOSS DUE TO ACCIDENT OR FIRE DURING REPAIR.<br>
                        3. VEHICLE WILL BE DELIVERED ONLY AFTER FULL SETTLEMENT OF BILL.
                    </div>
                    <div style="margin-top:80px; display:flex; justify-content:space-between;">
                        <p style="border-top:2px solid #000; width:220px; text-align:center; padding-top:10px; font-weight:bold;">CUSTOMER SIGNATURE</p>
                        <p style="border-top:2px solid #000; width:220px; text-align:center; padding-top:10px; font-weight:bold;">FOR MAA TARA GARAGE</p>
                    </div>
                    <p style="text-align:center; font-size:10px; margin-top:30px; letter-spacing:3px; font-weight:bold;">--- ${copyType} ---</p>
                </div>`;

            document.getElementById('printSection').innerHTML = renderBill("CUSTOMER COPY") + renderBill("OFFICE COPY");
            document.getElementById('printSection').classList.remove('hidden');
            window.print();
        }
    </script>
</body>
</html>
