<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maa Tara Garage - Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } .print-page { border: 2px solid #000; padding: 20px; margin-bottom: 30px; page-break-after: always; color: black; } }
    </style>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen">

    <div id="lockScreen" class="flex items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-yellow-500 text-center">
            <h1 class="text-3xl font-bold mb-6 text-yellow-500">MAA TARA GARAGE</h1>
            <input type="password" id="passInput" placeholder="Enter Password" class="w-full p-4 bg-slate-700 rounded-lg mb-4 text-center text-xl outline-none focus:border-yellow-500 border-2 border-transparent text-white">
            <button onclick="checkLogin()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-lg">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 max-w-5xl mx-auto no-print">
        <div class="bg-slate-800 p-6 rounded-xl border-b-4 border-yellow-500 mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold text-yellow-500">MAA TARA GARAGE</h2>
            <button onclick="location.reload()" class="text-red-500 font-bold">LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-800 p-6 rounded-xl mb-6">
            <input type="text" id="owner" placeholder="Owner Name" class="p-3 bg-slate-700 rounded">
            <input type="text" id="regNo" placeholder="Vehicle No (CG04...)" class="p-3 bg-slate-700 rounded font-bold uppercase">
            <input type="date" id="date" class="p-3 bg-slate-700 rounded">
            <input type="text" id="driver" placeholder="Driver Name" class="p-3 bg-slate-700 rounded">
            <input type="text" id="phone" placeholder="Phone" class="p-3 bg-slate-700 rounded">
            <input type="text" id="mechanic" placeholder="Mechanic" class="p-3 bg-slate-700 rounded">
        </div>

        <div class="bg-slate-800 p-6 rounded-xl">
            <table class="w-full text-left mb-4">
                <thead><tr class="text-yellow-500 border-b border-slate-600"><th class="py-2">S.No</th><th>Work Description</th><th class="text-right">Rate</th></tr></thead>
                <tbody id="workBody">
                    <tr><td class="py-2">1</td><td><input type="text" class="w-full bg-slate-700 p-2 rounded work-desc"></td><td><input type="number" class="w-full bg-slate-700 p-2 rounded text-right work-rate" oninput="total()"></td></tr>
                </tbody>
            </table>
            <button onclick="addRow()" class="text-yellow-500 font-bold">+ ADD ROW</button>
            <div class="text-right text-2xl font-bold mt-4">Total: ₹<span id="totalVal">0</span></div>
            <button onclick="doPrint()" class="w-full mt-6 bg-green-600 py-4 rounded-xl font-bold text-xl">PRINT INVOICE</button>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // PASSWORD YAHAN HAI: Aap badal sakte hain
        function checkLogin() {
            if(document.getElementById('passInput').value === "Bapi@0520") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            } else { alert("Galat Password!"); }
        }

        function addRow() {
            let body = document.getElementById('workBody');
            let row = body.insertRow();
            row.innerHTML = `<td class="py-2">${body.rows.length}</td><td><input type="text" class="w-full bg-slate-700 p-2 rounded work-desc"></td><td><input type="number" class="w-full bg-slate-700 p-2 rounded text-right work-rate" oninput="total()"></td>`;
        }

        function total() {
            let sum = 0;
            document.querySelectorAll('.work-rate').forEach(i => sum += Number(i.value) || 0);
            document.getElementById('totalVal').innerText = sum;
        }

        function doPrint() {
            let rows = "";
            let t = document.getElementById('totalVal').innerText;
            document.querySelectorAll('.work-desc').forEach((d, i) => {
                let r = document.querySelectorAll('.work-rate')[i].value;
                if(d.value) rows += `<tr><td style="border:1px solid #000;padding:8px;">${i+1}</td><td style="border:1px solid #000;padding:8px;">${d.value}</td><td style="border:1px solid #000;padding:8px;text-align:right;">₹${r}</td></tr>`;
            });

            let content = `
                <div class="print-page">
                    <h1 style="text-align:center;margin:0;">MAA TARA GARAGE</h1>
                    <p style="text-align:center;">Transport Nagar, Raipur | Mob: 982XXXXXXXX</p>
                    <hr>
                    <p><b>Vehicle:</b> ${document.getElementById('regNo').value} | <b>Owner:</b> ${document.getElementById('owner').value}</p>
                    <p><b>Date:</b> ${document.getElementById('date').value} | <b>Mechanic:</b> ${document.getElementById('mechanic').value}</p>
                    <table style="width:100%;border-collapse:collapse;margin-top:10px;">
                        <thead><tr style="background:#eee;"><th>S.No</th><th>Description</th><th style="text-align:right;">Amount</th></tr></thead>
                        <tbody>${rows}</tbody>
                        <tfoot><tr><th colspan="2" style="text-align:right;padding:10px;">TOTAL:</th><th style="text-align:right;padding:10px;">₹${t}</th></tr></tfoot>
                    </table>
                    <div style="margin-top:30px;display:flex;justify-content:space-between;">
                        <span>Customer Sign</span><span>For Maa Tara Garage</span>
                    </div>
                </div>`;
            
            document.getElementById('printArea').innerHTML = content + "<br>" + content;
            document.getElementById('printArea').classList.remove('hidden');
            window.print();
        }
    </script>
</body>
</html>
