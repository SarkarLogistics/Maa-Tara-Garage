<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAA TARA GARAGE - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.92)), 
                        url('https://images.unsplash.com/photo-1486006396113-c7b349741f15?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; color: white; font-family: sans-serif; min-height: 100vh;
        }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        input, select { background: #1e293b; color: white; border: 1px solid #475569; padding: 12px; border-radius: 10px; width: 100%; text-transform: uppercase; outline: none; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; }
            #printArea { display: block !important; visibility: visible !important; }
            .print-page { border: 2px solid black; padding: 30px; margin: 10px; page-break-after: always; color: black !important; position: relative; min-height: 95vh; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid black !important; padding: 10px; text-align: left; }
            .terms-box { border-top: 1px dashed black; margin-top: 20px; padding-top: 10px; font-size: 11px; line-height: 1.4; }
            .thank-you-note { text-align: center; margin-top: 30px; font-style: italic; font-weight: bold; color: #1e293b !important; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="loginSection" class="flex flex-col items-center justify-center h-[85vh] no-print">
        <div class="glass-card p-10 w-full max-w-sm text-center border-t-8 border-yellow-500 shadow-2xl">
            <h1 class="text-4xl font-black text-yellow-500 mb-2 italic tracking-tighter">MAA TARA</h1>
            <p class="text-gray-400 text-xs mb-8 font-bold tracking-widest uppercase">Garage Management</p>
            <input type="password" id="passInput" placeholder="ENTER PASSWORD" class="mb-6 text-center text-xl font-bold border-yellow-500/30">
            <button onclick="doLogin()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-5 rounded-2xl shadow-lg transition-all transform active:scale-95">LOGIN TO SYSTEM</button>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-7xl mx-auto no-print">
        <header class="glass-card p-6 mb-8 flex flex-wrap justify-between items-center border-b-4 border-yellow-500">
            <div>
                <h1 class="text-4xl font-black text-yellow-500 tracking-tighter">MAA TARA GARAGE</h1>
                <p class="text-sm font-bold text-gray-300 uppercase">Transport Nagar, Raipur (C.G.)</p>
            </div>
            <div class="flex gap-4 mt-4 lg:mt-0">
                <select id="docType" class="w-48 border-yellow-500 text-yellow-500 font-bold bg-slate-900 rounded-xl">
                    <option value="FINAL BILL">FINAL BILL</option>
                    <option value="QUOTATION">QUOTATION</option>
                </select>
                <button onclick="doLogout()" class="bg-red-600 px-6 py-2 rounded-xl font-bold hover:bg-red-700 shadow-lg">LOGOUT</button>
            </div>
        </header>

        <div class="glass-card p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 shadow-2xl">
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Vehicle No</label><input type="text" id="vNo" placeholder="CG 04 XXXX"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Owner Name</label><input type="text" id="oName" placeholder="ENTER NAME"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Owner Phone</label><input type="text" id="oPhone" placeholder="MOBILE NO"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Date</label><input type="date" id="vDate"></div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-yellow-500 uppercase">Wheels</label>
                <select id="vWheels">
                    <option>6 CHAKKA</option><option>10 CHAKKA</option><option>12 CHAKKA</option>
                    <option>14 CHAKKA</option><option>16 CHAKKA</option><option>18 CHAKKA</option><option>22 CHAKKA</option>
                </select>
            </div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Truck Model</label><input type="text" id="vModel" placeholder="e.g. TATA 2518"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Driver Name</label><input type="text" id="dName" placeholder="DRIVER NAME"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-yellow-500 uppercase">Driver Contact</label><input type="text" id="dPhone" placeholder="DRIVER PHONE"></div>
            <div class="col-span-1 lg:col-span-4"><label class="text-xs font-bold text-yellow-500 uppercase">Mechanic Name</label><input type="text" id="mName" placeholder="NAME"></div>
        </div>

        <div class="glass-card p-8 shadow-2xl overflow-hidden">
            <table class="w-full mb-6">
                <thead class="text-yellow-500 border-b border-gray-700 uppercase text-xs tracking-wider">
                    <tr><th class="p-4 w-16">SN</th><th>WORK DESCRIPTION</th><th class="w-24 text-center">QTY</th><th class="w-32 text-right">RATE</th><th class="w-32 text-right">AMOUNT</th></tr>
                </thead>
                <tbody id="workTable">
                    <tr class="border-b border-gray-800/50">
                        <td class="p-4 font-bold text-gray-500">1</td>
                        <td class="p-2"><input type="text" class="row-desc bg-transparent border-0 focus:bg-slate-800"></td>
                        <td class="p-2"><input type="number" class="row-qty text-center bg-transparent" value="1" oninput="calc()"></td>
                        <td class="p-2"><input type="number" class="row-rate text-right bg-transparent" oninput="calc()"></td>
                        <td class="p-2 text-right font-bold text-yellow-500">₹<span class="row-total">0</span></td>
                    </tr>
                </tbody>
            </table>
            <div class="flex flex-wrap justify-between items-center mt-6 gap-4">
                <button onclick="addRow()" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-bold shadow-lg transition-all transform active:scale-95">+ ADD LINE</button>
                <div class="text-right">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Grand Total</p>
                    <h2 class="text-5xl font-black text-yellow-500 tracking-tighter">₹<span id="grandTotal">0</span></h2>
                </div>
            </div>
            <button onclick="printBill()" class="w-full mt-10 bg-green-600 hover:bg-green-500 text-white py-6 rounded-2xl font-black text-3xl uppercase shadow-2xl transition-all border-b-8 border-green-800 active:border-b-0">SAVE & PRINT INVOICE</button>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        const MASTER_PASS = "Bapi@0520";

        window.onload = function() {
            if(localStorage.getItem("mtg_auth") === "true") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            }
        };

        function doLogin() {
            if(document.getElementById('passInput').value === MASTER_PASS) {
                localStorage.setItem("mtg_auth", "true");
                location.reload();
            } else { alert("ACCESS DENIED: WRONG PASSWORD!"); }
        }

        function doLogout() {
            localStorage.removeItem("mtg_auth");
            location.reload();
        }

        function addRow() {
            let t = document.getElementById('workTable');
            let r = t.insertRow();
            r.className = "border-b border-gray-800/50";
            r.innerHTML = `<td class="p-4 font-bold text-gray-500">${t.rows.length}</td><td class="p-2"><input type="text" class="row-desc bg-transparent border-0 focus:bg-slate-800"></td><td class="p-2"><input type="number" class="row-qty text-center bg-transparent" value="1" oninput="calc()"></td><td class="p-2"><input type="number" class="row-rate text-right bg-transparent" oninput="calc()"></td><td class="p-2 text-right font-bold text-yellow-500">₹<span class="row-total">0</span></td>`;
        }

        function calc() {
            let grand = 0;
            document.querySelectorAll('#workTable tr').forEach(row => {
                let q = parseFloat(row.querySelector('.row-qty').value) || 0;
                let r = parseFloat(row.querySelector('.row-rate').value) || 0;
                let tot = q * r;
                row.querySelector('.row-total').innerText = tot;
                grand += tot;
            });
            document.getElementById('grandTotal').innerText = grand;
        }

        function printBill() {
            const v = document.getElementById('vNo').value;
            const d = document.getElementById('vDate').value;
            if(!v || !d) return alert("Vehicle No and Date Required!");

            let items = "";
            document.querySelectorAll('#workTable tr').forEach((row, i) => {
                let desc = row.querySelector('.row-desc').value.toUpperCase();
                let q = row.querySelector('.row-qty').value;
                let r = row.querySelector('.row-rate').value;
                if(desc) items += `<tr><td style="text-align:center">${i+1}</td><td>${desc}</td><td style="text-align:center">${q}</td><td style="text-align:right">${r}</td><td style="text-align:right"><b>${q*r}</b></td></tr>`;
            });

            const template = (label) => `
                <div class="print-page">
                    <div style="display:flex; justify-content:space-between; border-bottom:4px solid black; padding-bottom:5px;">
                        <div>
                            <h1 style="margin:0; font-size:42px; font-weight:900;">MAA TARA GARAGE</h1>
                            <p style="margin:0; font-weight:bold;">TRANSPORT NAGAR, RAIPUR (C.G.) | Mob: 94255-07393</p>
                        </div>
                        <div style="text-align:right">
                            <h2 style="border:2px solid black; padding:5px 15px; margin:0; background:#eee;">${document.getElementById('docType').value}</h2>
                            <p style="margin-top:5px;">Date: <b>${d}</b></p>
                        </div>
                    </div>
                    <div style="margin:15px 0; display:grid; grid-template-columns:1fr 1fr; gap:8px; border:1px solid black; padding:12px; font-size:13px;">
                        <span><b>VEHICLE NO:</b> ${v.toUpperCase()}</span> <span><b>OWNER:</b> ${document.getElementById('oName').value.toUpperCase()}</span>
                        <span><b>MODEL:</b> ${document.getElementById('vModel').value.toUpperCase()} (${document.getElementById('vWheels').value})</span> <span><b>PHONE:</b> ${document.getElementById('oPhone').value}</span>
                        <span><b>DRIVER:</b> ${document.getElementById('dName').value.toUpperCase()}</span> <span><b>MECHANIC:</b> ${document.getElementById('mName').value.toUpperCase()}</span>
                    </div>
                    <table>
                        <thead><tr style="background:#f1f5f9;"><th style="width:40px">SN</th><th>DESCRIPTION OF WORK</th><th style="width:60px">QTY</th><th style="width:90px">RATE</th><th style="width:110px">AMOUNT</th></tr></thead>
                        <tbody>${items}</tbody>
                        <tfoot><tr><th colspan="4" style="text-align:right; font-size:18px;">GRAND TOTAL:</th><th style="text-align:right; font-size:20px;">₹${document.getElementById('grandTotal').innerText}</th></tr></tfoot>
                    </table>
                    <div class="terms-box">
                        <b>TERMS & CONDITIONS:</b><br>
                        1. Goods once sold will not be taken back or exchanged.<br>
                        2. The garage is not responsible for any loss by fire, accident, or theft while the vehicle is in our custody.<br>
                        3. Spare parts are not sold by the garage. They are either provided by you or installed with your prior consent and approval.
                    </div>
                    <div class="thank-you-note">
                        🌟 Thank you for choosing MAA TARA GARAGE! We value your trust and look forward to serving you again. Have a safe journey! 🌟
                    </div>
                    <div style="margin-top:50px; display:flex; justify-content:space-between;">
                        <span style="border-top:1px solid black; width:150px; text-align:center; font-weight:bold; padding-top:5px;">Customer Sign</span>
                        <span style="border-top:1px solid black; width:180px; text-align:center; font-weight:bold; padding-top:5px;">For Maa Tara Garage</span>
                    </div>
                    <p style="text-align:center; font-size:9px; margin-top:20px; color:#666 !important;">--- ${label} ---</p>
                </div>`;

            const printDiv = document.getElementById('printArea');
            printDiv.innerHTML = template("CUSTOMER COPY") + template("OFFICE COPY");
            printDiv.classList.remove('hidden');
            window.print();
            printDiv.classList.add('hidden');
        }
    </script>
</body>
</html>
