<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Job Card System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="lockScreen" class="h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border-t-4 border-blue-600">
            <h1 class="text-2xl font-bold mb-4 text-center">GARAGE LOGIN</h1>
            <input type="password" id="passInput" placeholder="Password" class="w-full p-3 border rounded mb-4 outline-none">
            <button onclick="checkAccess()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">OPEN DASHBOARD</button>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-4xl mx-auto p-4 md:p-8">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-blue-600 p-6 text-white">
                <h1 class="text-3xl font-bold uppercase tracking-widest">S-LOGISTIC GARAGE</h1>
                <p class="text-sm opacity-90">Industrial Area, Raipur | Phone: +91-XXXXXXXXXX</p>
                <p class="text-xs mt-1 italic">Truck Repairing & Maintenance Experts</p>
            </div>

            <div class="p-6">
                <h2 class="text-xl font-bold mb-6 text-gray-700 border-b pb-2">CREATE NEW JOB CARD</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold mb-1">Owner Name</label>
                        <input type="text" id="ownerName" class="w-full p-2 border rounded bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Driver Name</label>
                        <input type="text" id="driverName" class="w-full p-2 border rounded bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Phone Number</label>
                        <input type="number" id="phone" class="w-full p-2 border rounded bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Vehicle Reg. Number</label>
                        <input type="text" id="regNo" placeholder="CG 04 XX XXXX" class="w-full p-2 border rounded bg-gray-50">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1">Vehicle Model</label>
                        <select id="model" class="w-full p-2 border rounded bg-gray-50">
                            <option>Tata Truck</option>
                            <option>Ashok Leyland</option>
                            <option>BharatBenz</option>
                            <option>Eicher</option>
                            <option>Mahindra</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Wheel Type</label>
                        <select id="wheels" class="w-full p-2 border rounded bg-gray-50">
                            <option>6 Wheel</option>
                            <option>10 Wheel</option>
                            <option>12 Wheel</option>
                            <option>14 Wheel</option>
                            <option>18 Wheel</option>
                            <option>22 Wheel</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1">Operation Mechanic</label>
                        <input type="text" id="mechanic" class="w-full p-2 border rounded bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Date</label>
                        <input type="date" id="date" class="w-full p-2 border rounded bg-gray-50">
                    </div>
                </div>

                <div class="mt-8 p-4 bg-gray-50 rounded border text-xs text-gray-500">
                    <p class="font-bold mb-1">Terms & Conditions:</p>
                    <p>1. Estimate is valid for 7 days. 2. Parts once opened cannot be returned. 3. Vehicle delivery only after full payment.</p>
                </div>

                <button onclick="generateJobCard()" class="mt-6 w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition">GENERATE & PRINT QUOTATION</button>
            </div>
        </div>
    </div>

    <script>
        // Use your previous Firebase logic here to check access
        function checkAccess() {
            // Humne jo Firebase setup kiya tha wahi yahan kaam karega
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        function generateJobCard() {
            const data = {
                owner: document.getElementById('ownerName').value,
                reg: document.getElementById('regNo').value,
                model: document.getElementById('model').value,
                wheels: document.getElementById('wheels').value
            };
            
            if(!data.owner || !data.reg) {
                alert("Please fill basic details!");
                return;
            }

            // Simple Print Preview
            window.print();
        }
    </script>
</body>
</html>
