<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAA TARA GARAGE - FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        input, select { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; width: 100%; text-transform: uppercase; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .print-page { border: 2px solid black; padding: 25px; margin: 10px; page-break-after: always; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid black !important; padding: 8px; text-align: left; }
        }
    </style>
</head>
<body class="p-4">

    <div id="loginSection" class="flex flex-col items-center justify-center h-screen no-print">
        <div class="bg-slate-800 p-8 rounded-2xl border-t-4 border-yellow-500 shadow-2xl w-80 text-center">
            <h1 class="text-2xl font-bold text-yellow-500 mb-6">MAA TARA GARAGE</h1>
            <input type="password" id="passCode" placeholder="PASSWORD" class="mb-4 text-center">
            <button onclick="checkLogin()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg">LOGIN</button>
        </div>
    </div>

    <div id="appSection" class="hidden max-w-6xl mx-auto no-print">
        <div class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-xl border-b-4 border-yellow-500">
            <h1 class="text-2xl font-bold text-yellow-500">MAA TARA GARAGE</h1>
            <select id="docType" class="w-40 bg-slate-700 text-white p-2 rounded">
                <option>FINAL BILL</option>
                <option>QUOTATION</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-slate-800 p-6 rounded-xl">
            <input type="text" id="vNo" placeholder="VEHICLE NO">
            <input type="text" id="oName" placeholder="OWNER NAME">
            <input type="text" id="oPhone" placeholder="OWNER PHONE">
            <input type="date" id="bDate">
            <select id="vWheels">
                <option>6 CHAKKA</option><option>10 CHAKKA</option><option>12 CHAKKA</option>
                <option>14 CHAKKA</option><option>16 CHAKKA</option><option>22 CHAKKA</option>
            </select>
            <input type="text" id="vModel" placeholder="TRUCK MODEL">
            <input type="text" id="dName" placeholder="DRIVER NAME">
            <input type="text" id="dPhone" placeholder="DRIVER PHONE">
            <input type="text" id="mName" placeholder="MECHANIC NAME" class="md:col-span-4">
        </div>

        <div class="bg-slate-800 p-6 rounded-xl">
            <table class="w-full mb-4">
                <thead class="text-yellow-500 border-b border-gray-600">
                    <tr><th>SN</th><th>WORK DESCRIPTION</th><th class="w-20">QTY</th><th class="w-28">RATE</th><th class="w-28 text-right">AMT</th></tr>
                </thead>
                <tbody id="workTable">
                    <tr>
                        <td class="p-2">1</td>
                        <td><input type="text" class="row-desc border-0"></td>
                        <td><input type="number" class="row-qty text-center" value="1" oninput="doTotal()"></td>
                        <td><input type="number" class="row-rate text-right" oninput="doTotal()"></td>
                        <td class="text-right font-bold text-yellow-500">₹<span class="row-amt">0</span></td>
                    </tr>
                </tbody>
            </table>
            <div class="flex justify-between items-center">
                <button onclick="addRow()" class="bg-blue-600 px-4 py-2 rounded font-bold">+ ADD LINE</button>
                <h2 class="text-3xl font-bold text-yellow-500">TOTAL: ₹<span id="gTotal">0</span></h2>
            </div>
            <button onclick="startPrint()" class="w-full mt-8 bg-green-600 py-4 rounded-xl font-bold text-xl uppercase">SAVE & PRINT</button>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        function checkLogin() {
            // Password exact: Bapi@0520
            if(document.getElementById('passCode').value === "Bapi@0520") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }

        function addRow() {
            let t = document.getElementById('workTable');
            let r = t.insertRow();
            r.innerHTML = `<td class="p-2">${t.rows.length}</td><td><input type="text" class="row-desc border-0"></td><td><input type="number" class="row-qty text-center" value="1" oninput="doTotal()"></td><td><input type="number" class="row-rate text-right" oninput="doTotal()"></td><td class="text-right font-bold text-yellow-500">₹<span class="row-amt">0</span></td>`;
        }

        function doTotal() {
            let grand = 0;
            document.querySelectorAll('#workTable tr').forEach(row => {
                let q = row.querySelector('.row-qty').value || 0;
                let r = row.querySelector('.row-rate').value || 0;
                let a = q * r;
                row.querySelector('.row-amt').innerText = a;
                grand += a;
            });
            document.getElementById('gTotal').innerText = grand;
        }

        function startPrint() {
            const bill = {
                v: document.getElementById('vNo').value,
                o: document.getElementById('oName').value,
                dt: document.getElementById('bDate').value,
                gt: document.getElementById('gTotal').innerText,
                type: document.getElementById('docType').value
            };
            
            if(!bill.v || !bill.dt) return alert("Vehicle No & Date bharo!");

            let items = "";
            document.querySelectorAll('#workTable tr').forEach((row, i) => {
                let d = row.querySelector('.row-desc').value;
                let q = row.querySelector('.row-qty').value;
                let r = row.querySelector('.row-rate').value;
                if(d) items += `<tr><td>${i+1}</td><td>${d.toUpperCase()}</td><td>${q}</td><td>${r}</td><td style="text-align:right">${q*r}</td></tr>`;
            });

            const template = (title) => `
                <div class="print-page">
                    <h1 style="margin:0; font-size:35px; text-align:center;">MAA TARA GARAGE</h1>
                    <p style="text-align:center; margin:0;">Transport Nagar, Raipur | 9425507393</p>
                    <hr style="margin:15px 0;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <b>${title}</b> <b>Date: ${bill.dt}</b>
                    </div>
                    <p><b>Vehicle No:</b> ${bill.v.toUpperCase()} | <b>Model:</b> ${document.getElementById('vModel').value.toUpperCase()}</p>
                    <p><b>Owner:</b> ${bill.o.toUpperCase()} | <b>Mechanic:</b> ${document.getElementById('mName').value.toUpperCase()}</p>
                    <table>
                        <thead><tr><th>SN</th><th>WORK</th><th>QTY</th><th>RATE</th><th>AMT</th></tr></thead>
                        <tbody>${items}</tbody>
                        <tr><th colspan="4" style="text-align:right">GRAND TOTAL:</th><th style="text-align:right">₹${bill.gt}</th></tr>
                    </table>
                    <div style="margin-top:50px; display:flex; justify-content:space-between;">
                        <span>Customer Sign</span> <span>For Maa Tara Garage</span>
                    </div>
                </div>`;

            document.getElementById('printArea').innerHTML = template("CUSTOMER COPY") + template("OFFICE COPY");
            window.print();
        }
    </script>
</body>
</html>
