<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAA TARA GARAGE - Professional Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            min-height: screen;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        input, select { text-transform: uppercase; background: #334155; color: white; border-radius: 8px; padding: 12px; outline: none; border: 1px solid #475569; width: 100%; }
        input:focus { border-color: #eab308; background: #1e293b; }
        .btn-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        
        @media print {
            .no-print { display: none; }
            body { background: white !important; color: black !important; }
            .print-page { 
                border: 4px double #000; 
                padding: 30px; 
                margin: 10px;
                page-break-after: always; 
                color: black !important;
            }
            .highlight-box { background-color: #f3f4f6 !important; border: 1px solid #000 !important; font-weight: bold; padding: 5px 10px; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid black !important; padding: 10px; text-align: left; }
            th { background: #e5e7eb !important; }
        }
    </style>
</head>
<body class="p-0 m-0">

    <div id="lockScreen" class="flex items-center justify-center h-screen no-print">
        <div class="bg-slate-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-yellow-500 text-center">
            <h1 class="header-font text-3xl font-bold mb-2 text-yellow-500">MAA TARA GARAGE</h1>
            <p class="text-gray-400 mb-8 tracking-widest text-sm uppercase font-bold">Billing Dashboard</p>
            <input type="password" id="passInput" placeholder="ENTER PASSWORD" class="text-center text-2xl font-bold mb-6">
            <button onclick="checkLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase text-xl hover:bg-yellow-400 transition-all btn-glow">Unlock System</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 lg:p-8 max-w-7xl mx-auto no-print">
        <header class="bg-slate-800/80 backdrop-blur-md p-6 rounded-3xl border-b-4 border-yellow-500 mb-8 flex flex-wrap justify-between items-center shadow-2xl">
            <div>
                <h2 class="header-font text-3xl font-bold text-yellow-500">MAA TARA GARAGE</h2>
                <p class="text-gray-300 font-bold uppercase">Parking No. 1, Transport Nagar, Raipur (C.G.)</p>
                <p class="text-yellow-500 font-bold">+91 94255 07393, +91 73895 07393</p>
            </div>
            <div class="flex gap-4 mt-4 lg:mt-0">
                <button onclick="showHistory()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold border-b-4 border-blue-800 active:border-0">HISTORY</button>
                <button onclick="location.reload()" class="bg-red-600 px-6 py-2 rounded-xl font-bold border-b-4 border-red-800 active:border-0">LOGOUT</button>
            </div>
        </header>

        <div class="bg-slate-800/40 p-8 rounded-3xl mb-8 border border-white/10 shadow-inner">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">BILL TYPE</label>
                    <select id="billType">
                        <option value="QUOTATION / JOB CARD">QUOTATION (1 Month)</option>
                        <option value="FINAL BILL">FINAL BILL (1 Year)</option>
                    </select>
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">VEHICLE NO</label>
                    <input type="text" id="regNo" placeholder="CG 04 XXXX" class="font-bold text-yellow-400">
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">OWNER NAME</label>
                    <input type="text" id="owner" placeholder="NAME">
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">OWNER PHONE</label>
                    <input type="text" id="ownerPhone" placeholder="MOBILE NO">
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">DATE</label>
                    <input type="date" id="date">
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">VEHICLE MODEL</label>
                    <select id="model">
                        <option>TATA MOTORS</option><option>ASHOK LEYLAND</option><option>BHARAT BENZ</option><option>EICHER MOTORS</option>
                    </select>
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">WHEELS</label>
                    <select id="wheels">
                        <option>6 CHAKKA</option><option>10 CHAKKA</option><option>12 CHAKKA</option><option>22 CHAKKA</option>
                    </select>
                </div>
                <div>
                    <label class="text-yellow-500 text-xs font-bold mb-1 block">MECHANIC</label>
                    <input type="text" id="mechanic" placeholder="MECHANIC NAME">
                </div>
            </div>
        </div>

        <div class="bg-slate-800/40 p-8 rounded-3xl border border-white/10 shadow-2xl">
            <table class="w-full mb-6">
                <thead class="text-yellow-500 uppercase text-sm border-b border-white/20">
                    <tr><th class="p-4">SN</th><th>WORK DESCRIPTION</th><th class="w-24 text-center">QTY</th><th class="w-32 text-right">RATE</th></tr>
                </thead>
                <tbody id="workBody">
                    <tr class="border-b border-white/5">
                        <td class="p-4">1</td>
                        <td class="p-2"><input type="text" class="work-desc"></td>
                        <td class="p-2"><input type="number" class="text-center work-qty" value="1" oninput="calc()"></td>
                        <td class="p-2"><input type="number" class="text-right work-rate" placeholder="0" oninput="calc()"></td>
                    </tr>
                </tbody>
            </table>
            <div class="flex flex-wrap justify-between items-center bg-black/20 p-6 rounded-2xl border border-white/5">
                <button onclick="addRow()" class="bg-yellow-500 text-black px-8 py-3 rounded-xl font-bold uppercase hover:bg-yellow-400 mb-4 lg:mb-0 transition-all">Add New Line</button>
                <div class="text-3xl font-black text-yellow-500 uppercase">Total Amount: ₹<span id="totalVal">0</span></div>
            </div>
            <button onclick="saveAndPrint()" class="w-full mt-8 bg-green-600 py-6 rounded-2xl font-black text-3xl uppercase shadow-lg hover:bg-green-500 transition-all">Save & Print Bill</button>
        </div>
    </div>

    <div id="historyModal" class="hidden fixed inset-0 bg-black/95 p-6 z-50 overflow-y-auto no-print">
        <div class="max-w-4xl mx-auto bg-slate-900 p-8 rounded-3xl border border-yellow-500">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                <h2 class="text-3xl font-bold text-yellow-500 header-font">RECORDS</h2>
                <button onclick="document.getElementById('historyModal').classList.add('hidden')" class="text-red-500 text-5xl">&times;</button>
            </div>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // FIREBASE CONNECTION
        const firebaseConfig = { 
            apiKey: "AIzaSyAvR17FZtEaRPT1_xlHSGB6lc0tCTuwVSM", 
            authDomain: "maa-tara-garage.firebaseapp.com", 
            projectId: "maa-tara-garage", 
            storageBucket: "maa-tara-garage.appspot.com", 
            messagingSenderId: "689254184022", 
            appId: "1:689254184022:web:b3a4af5219dcff9b74f7f7" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // PASSWORD: Bapi@0520
        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            if(pass === "Bapi@0520") {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            } else { alert("WRONG PASSWORD!"); }
        }

        function addRow() {
            let b = document.getElementById('workBody');
            let r = b.insertRow();
            r.className = "border-b border-white/5";
            r.innerHTML = `<td class="p-4">${b.rows.length}</td><td class="p-2"><input type="text" class="work-desc"></td><td class="p-2"><input type="number" class="text-center work-qty" value="1" oninput="calc()"></td><td class="p-2"><input type="number" class="text-right work-rate" oninput="calc()"></td>`;
        }

        function calc() {
            let t = 0;
            document.querySelectorAll('#workBody tr').forEach(row => {
                let q = row.querySelector('.work-qty').value || 0;
                let r = row.querySelector('.work-rate').value || 0;
                t += (q * r);
            });
            document.getElementById('totalVal').innerText = t;
        }

        async function saveAndPrint() {
            const data = {
                reg: document.getElementById('regNo').value.toUpperCase(),
                owner: document.getElementById('owner').value.toUpperCase(),
                phone: document.getElementById('ownerPhone').value,
                date: document.getElementById('date').value,
                mechanic: document.getElementById('mechanic').value.toUpperCase(),
                total: document.getElementById('totalVal').innerText,
                type: document.getElementById('billType').value,
                expiry: Date.now() + (document.getElementById('billType').value.includes("QUOTATION") ? 30*86400000 : 365*86400000)
            };

            if(!data.reg || !data.date) { alert("Vehicle No aur Date bharna zaroori hai!"); return; }

            // Save Attempt
            try {
                await db.collection("records").add(data);
            } catch (e) {
                console.error("Firebase Error: ", e);
            }

            // Print Trigger
            printDoc(data);
        }

        async function showHistory() {
            document.getElementById('historyModal').classList.remove('hidden');
            const snap = await db.collection("records").orderBy("date", "desc").limit(20).get();
            let h = "";
            snap.forEach(doc => {
                let d = doc.data();
                h += `<div class="p-4 bg-slate-800 rounded-xl border-l-4 border-yellow-500 flex justify-between">
                        <span><b>${d.date}</b> | ${d.reg} | ${d.owner}</span>
                        <span class="font-bold text-yellow-500">₹${d.total}</span>
                      </div>`;
            });
            document.getElementById('historyList').innerHTML = h || "No Records Found";
        }

        function printDoc(data) {
            let rows = "";
            document.querySelectorAll('#workBody tr').forEach((row, i) => {
                let d = row.querySelector('.work-desc').value.toUpperCase();
                let q = row.querySelector('.work-qty').value;
                let r = row.querySelector('.work-rate').value;
                if(d) rows += `<tr><td>${i+1}</td><td>${d}</td><td style="text-align:center">${q}</td><td style="text-align:right">₹${r}</td><td style="text-align:right">₹${q*r}</td></tr>`;
            });

            const content = (copy) => `
                <div class="print-page">
                    <div style="display:flex; justify-content:space-between; border-bottom:3px solid #000; padding-bottom:10px;">
                        <div>
                            <h1 class="header-font" style="font-size:35px; margin:0;">MAA TARA GARAGE</h1>
                            <p style="font-weight:bold; margin:0;">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                            <p style="margin:0;">MOB: +91 94255 07393, +91 73895 07393</p>
                        </div>
                        <div style="text-align:right">
                            <h2 style="border:2px solid #000; padding:5px 15px; margin:0;">${data.type}</h2>
                            <p style="margin-top:10px;">DATE: <b>${data.date}</b></p>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                        <div class="highlight-box">VEHICLE: ${data.reg}</div>
                        <div class="highlight-box">OWNER: ${data.owner}</div>
                        <div class="highlight-box">PHONE: ${data.phone}</div>
                        <div class="highlight-box">MECHANIC: ${data.mechanic}</div>
                    </div>
                    <table>
                        <thead><tr><th>SN</th><th>WORK DESCRIPTION</th><th>QTY</th><th>RATE</th><th>AMOUNT</th></tr></thead>
                        <tbody>${rows}</tbody>
                        <tfoot>
                            <tr><th colspan="4" style="text-align:right; font-size:18px;">TOTAL AMOUNT:</th><th style="font-size:22px;">₹${data.total}</th></tr>
                        </tfoot>
                    </table>
                    <div style="margin-top:30px; font-size:12px; font-weight:bold;">
                        TERMS:<br>1. GOODS SOLD NOT RETURNABLE. <br>2. NOT RESPONSIBLE FOR ACCIDENT/FIRE. <br>3. FULL PAYMENT BEFORE DELIVERY.
                    </div>
                    <div style="margin-top:80px; display:flex; justify-content:space-between;">
                        <p style="border-top:1px solid #000; width:200px; text-align:center;">CUSTOMER SIGN</p>
                        <p style="border-top:1px solid #000; width:200px; text-align:center;">FOR MAA TARA GARAGE</p>
                    </div>
                    <p style="text-align:center; font-size:10px; margin-top:20px;">--- ${copy} ---</p>
                </div>`;

            document.getElementById('printArea').innerHTML = content("CUSTOMER COPY") + content("OFFICE COPY");
            document.getElementById('printArea').classList.remove('hidden');
            window.print();
        }
    </script>
</body>
</html>
