<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAA TARA GARAGE - Professional Billing System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1599256872237-5dcc0fbe9668?q=80&w=2000');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        input, select { text-transform: uppercase; background: #1e293b; color: white; border-radius: 8px; padding: 10px; outline: none; border: 1px solid #334155; }
        input:focus { border-color: #eab308; }
        @media print {
            .no-print { display: none; }
            body { background: white !important; color: black !important; padding: 0; }
            .print-page { 
                border: 3px solid #eab308; 
                padding: 25px; 
                margin-bottom: 20px; 
                page-break-after: always; 
                text-transform: uppercase; 
                color: black;
                position: relative;
                overflow: hidden;
            }
            .print-page::before {
                content: "";
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background-image: url('https://images.unsplash.com/photo-1599256872237-5dcc0fbe9668?q=10&w=200');
                background-repeat: repeat;
                opacity: 0.03;
                z-index: -1;
            }
            .highlight-box { background-color: #fef9c3 !important; border: 1px solid #000 !important; font-weight: bold; padding: 4px 8px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; color: black; }
            th, td { border: 1px solid black !important; padding: 8px; }
            th { background: #f1f5f9 !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="lockScreen" class="flex items-center justify-center h-screen px-4 no-print">
        <div class="bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-yellow-500/50 text-center">
            <h1 class="header-font text-3xl font-bold mb-4 text-yellow-500">MAA TARA GARAGE</h1>
            <p class="text-xs text-gray-400 mb-6 tracking-widest">SECURE ACCESS</p>
            <input type="password" id="passInput" placeholder="ENTER PASSWORD" class="w-full p-4 mb-6 text-center text-xl font-bold border-b-2 border-yellow-500">
            <button onclick="checkLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase hover:bg-yellow-600 transition-all shadow-lg">Unlock System</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 lg:p-8 max-w-6xl mx-auto no-print">
        <header class="bg-slate-800 p-6 rounded-3xl border-b-4 border-yellow-500 mb-6 flex justify-between items-center shadow-xl">
            <div>
                <h2 class="header-font text-2xl font-bold text-yellow-500">MAA TARA GARAGE</h2>
                <p class="text-xs text-gray-400">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                <p class="text-[10px] text-gray-500">+91 94255 07393, +91 73895 07393</p>
            </div>
            <div class="flex gap-3">
                <button onclick="showHistory()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition-all">HISTORY</button>
                <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-700 transition-all">LOGOUT</button>
            </div>
        </header>

        <div class="bg-slate-800/50 p-6 rounded-3xl mb-6 shadow-lg border border-white/5">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-yellow-500 font-bold ml-1">DOCUMENT TYPE</label>
                    <select id="billType" class="border-yellow-500 text-yellow-500 font-bold">
                        <option value="QUOTATION / JOB CARD">QUOTATION (1 Month Save)</option>
                        <option value=" ">FINAL BILL (1 Year Save)</option>
                    </select>
                </div>
                <input type="text" id="regNo" placeholder="VEHICLE NO" class="font-bold text-yellow-400">
                <input type="text" id="owner" placeholder="OWNER NAME">
                <input type="text" id="ownerPhone" placeholder="OWNER PHONE">
                <input type="date" id="date">
                <select id="model">
                    <option>TATA MOTORS</option><option>ASHOK LEYLAND</option><option>BHARAT BENZ</option><option>EICHER MOTORS</option><option>MAHINDRA</option>
                </select>
                <select id="wheels">
                    <option>6 CHAKKA</option><option>10 CHAKKA</option><option>12 CHAKKA</option><option>14 CHAKKA</option><option>16 CHAKKA</option><option>18 CHAKKA</option><option>22 CHAKKA</option>
                </select>
                <input type="text" id="driver" placeholder="DRIVER NAME">
                <input type="text" id="mechanic" placeholder="MECHANIC NAME">
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-3xl shadow-xl border border-white/5">
            <table class="w-full text-left mb-4">
                <thead class="text-yellow-500 border-b border-white/10">
                    <tr><th class="p-4">SN</th><th>WORK DESCRIPTION</th><th class="w-24 text-center">QTY</th><th class="w-32 text-right">RATE</th><th class="w-32 text-right">AMOUNT</th></tr>
                </thead>
                <tbody id="workBody">
                    <tr class="border-b border-white/5">
                        <td class="p-4">1</td>
                        <td class="p-2"><input type="text" class="w-full work-desc bg-slate-900/50"></td>
                        <td class="p-2"><input type="number" class="w-full text-center work-qty bg-slate-900/50" value="1" oninput="calc()"></td>
                        <td class="p-2"><input type="number" class="w-full text-right work-rate bg-slate-900/50" oninput="calc()"></td>
                        <td class="p-4 text-right font-bold text-yellow-500 row-total">₹0</td>
                    </tr>
                </tbody>
            </table>
            <div class="flex justify-between items-center p-4 bg-slate-900/30 rounded-2xl">
                <button onclick="addRow()" class="bg-yellow-500/10 text-yellow-500 px-6 py-2 rounded-full font-bold border border-yellow-500 hover:bg-yellow-500 hover:text-black transition-all">+ ADD WORK</button>
                <div class="text-3xl font-black text-yellow-500 uppercase">QUOTATION AMT: ₹<span id="totalVal">0</span></div>
            </div>
            <button onclick="saveAndPrint()" class="w-full mt-8 bg-green-600 py-5 rounded-2xl font-black text-2xl uppercase shadow-lg hover:bg-green-700 transition-all">SAVE & PRINT DOCUMENT</button>
        </div>
    </div>

    <div id="historyModal" class="hidden fixed inset-0 bg-black/95 p-6 z-50 overflow-y-auto no-print">
        <div class="max-w-4xl mx-auto bg-slate-900 p-8 rounded-3xl border border-yellow-500">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-yellow-500 header-font">BILLING RECORDS</h2>
                <button onclick="document.getElementById('historyModal').classList.add('hidden')" class="text-red-500 text-4xl">&times;</button>
            </div>
            <div id="historyList" class="space-y-4 text-white"></div>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // CONFIGURATION
        const firebaseConfig = { 
            apiKey: "AIzaSyAvR17FZtEaRPT1_xlHSGB6lc0tCTuwVSM", 
            authDomain: "maa-tara-garage.firebaseapp.com", 
            projectId: "maa-tara-garage", 
            storageBucket: "maa-tara-garage.appspot.com", 
            messagingSenderId: "689254184022", 
            appId: "1:689254184022:web:b3a4af5219dcff9b74f7f7" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LOGIN WITH YOUR NEW PASSWORD
        function checkLogin() {
            if(document.getElementById('passInput').value === "Bapi@0520") {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                cleanupOldBills();
            } else { alert("WRONG PASSWORD!"); }
        }

        function addRow() {
            let b = document.getElementById('workBody');
            let r = b.insertRow();
            r.className = "border-b border-white/5";
            r.innerHTML = `<td class="p-4">${b.rows.length}</td><td class="p-2"><input type="text" class="w-full work-desc bg-slate-900/50"></td><td class="p-2"><input type="number" class="w-full text-center work-qty bg-slate-900/50" value="1" oninput="calc()"></td><td class="p-2"><input type="number" class="w-full text-right work-rate bg-slate-900/50" oninput="calc()"></td><td class="p-4 text-right font-bold text-yellow-500 row-total">₹0</td>`;
        }

        function calc() {
            let t = 0;
            document.querySelectorAll('#workBody tr').forEach(row => {
                let q = row.querySelector('.work-qty').value || 0;
                let r = row.querySelector('.work-rate').value || 0;
                let amt = q * r;
                row.querySelector('.row-total').innerText = "₹" + amt;
                t += amt;
            });
            document.getElementById('totalVal').innerText = t;
        }

        async function saveAndPrint() {
            const bType = document.getElementById('billType').value;
            const data = {
                reg: document.getElementById('regNo').value,
                owner: document.getElementById('owner').value,
                ownerPhone: document.getElementById('ownerPhone').value,
                date: document.getElementById('date').value,
                total: document.getElementById('totalVal').innerText,
                type: bType,
                expiry: Date.now() + (bType.includes("QUOTATION") ? 30*24*60*60*1000 : 365*24*60*60*1000)
            };
            if(!data.reg || !data.date) return alert("Pehle Date aur Vehicle No bhariye!");
            await db.collection("garage_records").add(data);
            printBill(data);
        }

        async function showHistory() {
            document.getElementById('historyModal').classList.remove('hidden');
            const snap = await db.collection("garage_records").orderBy("date", "desc").limit(30).get();
            let h = "";
            snap.forEach(doc => {
                let d = doc.data();
                h += `<div class="p-4 bg-slate-800 rounded-xl flex justify-between border border-white/5"><span>${d.date} | ${d.reg} | ${d.type || 'BILL'}</span><span class="font-bold text-green-400">₹${d.total}</span></div>`;
            });
            document.getElementById('historyList').innerHTML = h || "No Records Found";
        }

        async function cleanupOldBills() {
            const now = Date.now();
            const snap = await db.collection("garage_records").where("expiry", "<=", now).get();
            snap.forEach(doc => doc.ref.delete());
        }

        function printBill(data) {
            let items = "";
            document.querySelectorAll('#workBody tr').forEach((row, i) => {
                let d = row.querySelector('.work-desc').value;
                let q = row.querySelector('.work-qty').value;
                let r = row.querySelector('.work-rate').value;
                if(d) items += `<tr><td style="text-align:center">${i+1}</td><td>${d}</td><td style="text-align:center">${q}</td><td style="text-align:right">${r}</td><td style="text-align:right">${q*r}</td></tr>`;
            });

            const html = (copy) => `
                <div class="print-page">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <h1 class="header-font" style="font-size:38px; margin:0; color:#eab308">MAA TARA GARAGE</h1>
                            <p style="font-weight:bold; font-size:14px; margin-top:3px;">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                            <p style="margin:0; font-size:12px;">MOB: +91 94255 07393, +91 73895 07393</p>
                            <p style="margin:0; font-size:10px; color:#555;">SPECIALIST: TATA, ASHOK LEYLAND, BHARAT BENZ, EICHER TRUCKS</p>
                        </div>
                        <div style="text-align:right">
                            <div style="border:2px solid #000; padding:10px; font-weight:bold; min-width:180px; font-size:18px;">${data.type}</div>
                            <p style="margin-top:10px; font-weight:bold;">DATE: <span class="highlight-box">${data.date}</span></p>
                        </div>
                    </div>
                    <table style="width:100%; margin:20px 0; border:1px solid #000;">
                        <tr><td class="highlight-box" style="width:50%">VEHICLE NO: <span style="font-size:20px">${data.reg}</span></td><td class="highlight-box">OWNER: ${data.owner}</td></tr>
                        <tr><td>MODEL: ${document.getElementById('model').value} (${document.getElementById('wheels').value})</td><td>OWNER PHONE: ${data.ownerPhone}</td></tr>
                        <tr><td>MECHANIC: ${document.getElementById('mechanic').value}</td><td>DRIVER: ${document.getElementById('driver').value}</td></tr>
                    </table>
                    <table>
                        <thead><tr><th style="width:40px">SN</th><th>DESCRIPTION OF REPAIR WORK</th><th style="width:60px">QTY</th><th style="width:100px">RATE</th><th style="width:120px">AMOUNT</th></tr></thead>
                        <tbody>${items}</tbody>
                        <tfoot><tr><th colspan="4" style="text-align:right; padding:15px; font-size:16px;">QUOTATION AMOUNT:</th><th style="font-size:24px; text-align:right;" class="highlight-box">₹${data.total}</th></tr></tfoot>
                    </table>
                    <div style="margin-top:25px; font-size:11px; line-height:1.6; border:1px solid #ddd; padding:10px; border-radius:5px;">
                        <b>TERMS & CONDITIONS:</b><br>
                        1. WORK CARRIES WARRANTY AS PER PART MANUFACTURER POLICY.<br>
                        2. WE ARE NOT RESPONSIBLE FOR ANY LOSS DUE TO ACCIDENT OR FIRE DURING REPAIR.<br>
                        3. VEHICLE WILL BE DELIVERED ONLY AFTER FULL PAYMENT.<br>
                        4. GOODS ONCE SOLD ARE NOT RETURNABLE.
                    </div>
                    <h3 style="text-align:center; margin-top:35px; letter-spacing:4px; font-style:italic;">*** THANK YOU - VISIT AGAIN ***</h3>
                    <div style="margin-top:70px; display:flex; justify-content:space-between">
                        <span style="border-top:2px solid #000; width:220px; text-align:center; padding-top:8px; font-weight:bold">CUSTOMER SIGNATURE</span>
                        <span style="border-top:2px solid #000; width:220px; text-align:center; padding-top:8px; font-weight:bold">FOR MAA TARA GARAGE</span>
                    </div>
                    <p style="text-align:center; font-size:10px; margin-top:20px; color:#666; font-weight:bold;">--- ${copy} ---</p>
                </div>`;

            document.getElementById('printArea').innerHTML = html("CUSTOMER COPY") + html("OFFICE COPY");
            document.getElementById('printArea').classList.remove('hidden');
            window.print();
        }
    </script>
</body>
</html>
