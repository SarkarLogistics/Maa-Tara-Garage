<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAA TARA GARAGE - Official Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark Theme Background */
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            min-height: 100vh;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        input, select { 
            background: #334155; 
            color: white; 
            border: 1px solid #475569; 
            padding: 12px; 
            border-radius: 10px; 
            width: 100%; 
            text-transform: uppercase; 
            outline: none;
        }
        input:focus { border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            .print-page { 
                border: 2px solid #000; 
                padding: 40px; 
                margin: 20px; 
                color: black !important;
                page-break-after: always;
            }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid black !important; padding: 10px; text-align: left; }
            th { background: #f3f4f6 !important; }
            .total-box { background: #eee !important; font-weight: bold; border: 2px solid #000 !important; }
        }
    </style>
</head>
<body>

    <div id="lockScreen" class="flex items-center justify-center h-screen no-print">
        <div class="bg-slate-900 p-10 rounded-3xl border-2 border-yellow-500 shadow-2xl text-center w-full max-w-sm">
            <h1 class="header-font text-yellow-500 text-3xl mb-2">MAA TARA</h1>
            <p class="text-gray-400 text-sm mb-8 tracking-widest uppercase">Garage Dashboard</p>
            <input type="password" id="passInput" placeholder="ENTER PASSWORD" class="text-center text-xl mb-6">
            <button onclick="checkLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl hover:bg-yellow-400 transition-all">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 lg:p-8 max-w-6xl mx-auto no-print">
        <header class="bg-slate-800/80 backdrop-blur-md p-6 rounded-2xl border-b-4 border-yellow-500 mb-8 flex justify-between items-center shadow-lg">
            <div>
                <h1 class="header-font text-2xl text-yellow-500">MAA TARA GARAGE</h1>
                <p class="text-sm text-gray-300">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                <p class="text-xs text-yellow-500 font-bold">+91 94255 07393, +91 73895 07393</p>
            </div>
            <button onclick="location.reload()" class="bg-red-600 px-6 py-2 rounded-xl font-bold hover:bg-red-700">LOGOUT</button>
        </header>

        <div class="bg-slate-800/40 p-8 rounded-2xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 border border-white/5 shadow-inner">
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">VEHICLE NO</label><input type="text" id="regNo" placeholder="CG 04 XXXX"></div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">OWNER NAME</label><input type="text" id="owner" placeholder="NAME"></div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">PHONE</label><input type="text" id="phone" placeholder="999XXXXXXX"></div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">DRIVER NAME</label><input type="text" id="driver" placeholder="NAME"></div>
             <div><label class="text-yellow-500 text-xs font-bold mb-1 block">DRIVER PHONE</label><input type="text" id="driver phone" placeholder="999XXXXXXX"></div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">DATE</label><input type="date" id="date"></div>
            <div>
                <label class="text-yellow-500 text-xs font-bold mb-1 block">WHEELS</label>
                <select id="wheels">
                    <option>6 CHAKKA</option><option>10 CHAKKA</option><option>12 CHAKKA</option>
                    <option>14 CHAKKA</option><option>16 CHAKKA</option><option>18 CHAKKA</option><option>22 CHAKKA</option>
                </select>
            </div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">MODEL</label><input type="text" id="model" placeholder="E.G. TATA 2518"></div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">DRIVER</label><input type="text" id="driver" placeholder="NAME"></div>
            <div><label class="text-yellow-500 text-xs font-bold mb-1 block">MECHANIC</label><input type="text" id="mechanic" placeholder="NAME"></div>
        </div>

        <div class="bg-slate-800/40 p-8 rounded-2xl border border-white/5 shadow-2xl">
            <table class="w-full mb-6">
                <thead class="text-yellow-500 border-b border-white/10 uppercase text-sm">
                    <tr><th class="p-4">SN</th><th>WORK DESCRIPTION</th><th class="w-24 text-center">QTY</th><th class="w-32 text-right">RATE</th></tr>
                </thead>
                <tbody id="workBody">
                    <tr>
                        <td class="p-4">1</td>
                        <td class="p-2"><input type="text" class="w-desc"></td>
                        <td class="p-2"><input type="number" class="w-qty text-center" value="1" oninput="updateTotal()"></td>
                        <td class="p-2"><input type="number" class="w-rate text-right" placeholder="0" oninput="updateTotal()"></td>
                    </tr>
                </tbody>
            </table>
            <div class="flex flex-wrap justify-between items-center bg-black/20 p-6 rounded-2xl">
                <button onclick="addRow()" class="bg-yellow-500 text-black px-8 py-3 rounded-xl font-bold uppercase hover:bg-yellow-400">Add New Row</button>
                <h2 class="text-3xl font-black text-yellow-500">TOTAL: ₹<span id="finalTotal">0</span></h2>
            </div>
            <button onclick="saveAndPrint()" class="w-full mt-8 bg-green-600 py-6 rounded-2xl font-black text-3xl uppercase shadow-lg hover:bg-green-500 transition-all">Save & Print Invoice</button>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { 
            apiKey: "AIzaSyAvR17FZtEaRPT1_xlHSGB6lc0tCTuwVSM", 
            authDomain: "maa-tara-garage.firebaseapp.com", 
            projectId: "maa-tara-garage", 
            storageBucket: "maa-tara-garage.appspot.com", 
            messagingSenderId: "689254184022", 
            appId: "1:689254184022:web:b3a4af5219dcff9b74f7f7" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // PASSWORD LOGIN
        function checkLogin() {
            if(document.getElementById('passInput').value === "NjBapi@2005") {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            } else { alert("ACCESS DENIED: WRONG PASSWORD"); }
        }

        function addRow() {
            let b = document.getElementById('workBody');
            let r = b.insertRow();
            r.innerHTML = `<td class="p-4 text-center">${b.rows.length}</td><td class="p-2"><input type="text" class="w-desc"></td><td class="p-2"><input type="number" class="w-qty text-center" value="1" oninput="updateTotal()"></td><td class="p-2"><input type="number" class="w-rate text-right" oninput="updateTotal()"></td>`;
        }

        function updateTotal() {
            let t = 0;
            document.querySelectorAll('#workBody tr').forEach(row => {
                let q = row.querySelector('.w-qty').value || 0;
                let r = row.querySelector('.w-rate').value || 0;
                t += (q * r);
            });
            document.getElementById('finalTotal').innerText = t;
        }

        async function saveAndPrint() {
            const data = {
                reg: document.getElementById('regNo').value.toUpperCase(),
                owner: document.getElementById('owner').value.toUpperCase(),
                phone: document.getElementById('phone').value,
                date: document.getElementById('date').value,
                wheels: document.getElementById('wheels').value,
                model: document.getElementById('model').value.toUpperCase(),
                driver: document.getElementById('driver').value.toUpperCase(),
                mechanic: document.getElementById('mechanic').value.toUpperCase(),
                total: document.getElementById('finalTotal').innerText
            };

            if(!data.reg || !data.date) return alert("Vehicle No and Date are Mandatory!");

            // Attempt Save
            try { await db.collection("garage_bills").add(data); } catch(e) { console.log("Offline Mode Active"); }

            // Trigger Print
            generateInvoice(data);
        }

        function generateInvoice(data) {
            let rows = "";
            document.querySelectorAll('#workBody tr').forEach((row, i) => {
                let d = row.querySelector('.w-desc').value.toUpperCase();
                let q = row.querySelector('.w-qty').value;
                let r = row.querySelector('.w-rate').value;
                if(d) rows += `<tr><td style="text-align:center">${i+1}</td><td>${d}</td><td style="text-align:center">${q}</td><td style="text-align:right">₹${r}</td><td style="text-align:right">₹${q*r}</td></tr>`;
            });

            const invoiceBody = (type) => `
                <div class="print-page">
                    <div style="display:flex; justify-content:space-between; border-bottom:3px solid #000; padding-bottom:10px;">
                        <div>
                            <h1 class="header-font" style="font-size:38px; margin:0; color:#000;">MAA TARA GARAGE</h1>
                            <p style="font-weight:bold; margin:0;">PARKING NO. 1, TRANSPORT NAGAR, RAIPUR (C.G.)</p>
                            <p style="margin:0;">CONTACT: +91 94255 07393, +91 73895 07393</p>
                        </div>
                        <div style="text-align:right">
                            <h2 style="border:2px solid #000; padding:10px; margin:0;">INVOICE</h2>
                            <p style="margin-top:10px;">DATE: <b>${data.date}</b></p>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                        <div class="highlight">VEHICLE: ${data.reg}</div>
                        <div class="highlight">OWNER: ${data.owner}</div>
                        <div class="highlight">PHONE: ${data.phone}</div>
                        <div class="highlight">MODEL/TYPE: ${data.model} (${data.wheels})</div>
                        <div class="highlight">MECHANIC: ${data.mechanic}</div>
                        <div class="highlight">DRIVER: ${data.driver}</div>
                    </div>
                    <table>
                        <thead><tr><th>SN</th><th>DESCRIPTION OF WORK</th><th style="text-align:center">QTY</th><th style="text-align:right">RATE</th><th style="text-align:right">AMOUNT</th></tr></thead>
                        <tbody>${rows}</tbody>
                        <tfoot>
                            <tr><th colspan="4" style="text-align:right; font-size:20px;">GRAND TOTAL:</th><th style="font-size:24px; text-align:right;" class="total-box">₹${data.total}</th></tr>
                        </tfoot>
                    </table>
                    <div style="margin-top:30px; font-size:11px; border:1px solid #ccc; padding:10px;">
                        <b>TERMS:</b> 1. Goods once sold not returnable. 2. Not responsible for loss due to fire/accident. 3. Full payment required upon delivery.
                    </div>
                    <div style="margin-top:70px; display:flex; justify-content:space-between;">
                        <p style="border-top:1px solid #000; width:220px; text-align:center; font-weight:bold;">CUSTOMER SIGNATURE</p>
                        <p style="border-top:1px solid #000; width:220px; text-align:center; font-weight:bold;">FOR MAA TARA GARAGE</p>
                    </div>
                    <p style="text-align:center; font-size:10px; margin-top:15px;">--- ${type} ---</p>
                </div>`;

            document.getElementById('printArea').innerHTML = invoiceBody("CUSTOMER COPY") + invoiceBody("OFFICE COPY");
            document.getElementById('printArea').classList.remove('hidden');
            window.print();
        }
    </script>
</body>
</html>
